<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SBTI 人格测试</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 60px 40px;
      max-width: 600px;
    }
    h1 {
      font-size: 3rem;
      font-weight: 900;
      background: linear-gradient(135deg, #ff6b9d, #c44dff, #4dc8ff, #ffd32a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
    }
    p {
      color: #aaa;
      font-size: 1.1rem;
      margin-bottom: 40px;
      line-height: 1.6;
    }
    .cards {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 30px 24px;
      width: 240px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
      backdrop-filter: blur(10px);
    }
    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(255,255,255,0.3);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    .card .icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    .card h2 {
      font-size: 1.3rem;
      margin-bottom: 8px;
    }
    .card p {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 0;
    }
    .card.pink { border-color: rgba(255,107,157,0.3); }
    .card.pink:hover { border-color: #ff6b9d; box-shadow: 0 12px 40px rgba(255,107,157,0.15); }
    .card.purple { border-color: rgba(196,77,255,0.3); }
    .card.purple:hover { border-color: #c44dff; box-shadow: 0 12px 40px rgba(196,77,255,0.15); }
    .footer {
      margin-top: 40px;
      font-size: 0.85rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>SBTI</h1>
    <p>Silly Big Personality Test<br>选择你要进入的页面</p>
    <div class="cards">
      <a href="sbti_test.html" class="card pink">
        <div class="icon">🎯</div>
        <h2>开始测试</h2>
        <p>15道题目，测出你的SBTI人格类型</p>
      </a>
      <a href="SBTI_25types.html" class="card purple">
        <div class="icon">🎭</div>
        <h2>人格图鉴</h2>
        <p>查看27种SBTI人格详解</p>
      </a>
    </div>
    <div class="footer">SBTI · 恶搞人格测试</div>
  </div>
</body>
</html>
